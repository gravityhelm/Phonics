<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Elie's Reading Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Elie's Reading Cards</h1>

  <div class="level-picker" id="levelPicker" aria-label="Phonics level"></div>

  <div class="card-wrapper">
    <div class="card-inner" id="cardInner" role="button" aria-label="Flash card, tap to flip">

      <div class="card-face card-front">
        <div class="word-display" id="wordDisplay"></div>
        <div class="tap-hint">tap to flip</div>
      </div>

      <div class="card-face card-back">
        <div id="backEmoji" aria-hidden="true"></div>
        <div id="backWord"></div>
      </div>

    </div>
  </div>

  <div class="nav">
    <button class="nav-btn" id="prevBtn" aria-label="Previous card">&#9664; Prev</button>
    <span id="counter" aria-live="polite"></span>
    <button class="nav-btn" id="nextBtn" aria-label="Next card">Next &#9654;</button>
  </div>

  <button id="shuffleBtn">&#128256; Shuffle</button>

  <script src="words.js"></script>
  <script src="app.js"></script>
</body>
</html>
